.game-container{
width:95%;

height:95vh;

border-radius:20px;
padding:20px;
position:relative;

text-align:center;
margin-bottom:10px;
font-size:22px;

.score-board{
display:flex;
justify-content:space-between;
font-size:14px;

}

.word{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
font-size:22px;
background:rgba(255,255,255,0.1);
padding:8px 15px;
border-radius:10px;
border:1px solid gold;
animation:fall linear forwards;
}

@keyframes fall{
from{top:0;}
to{top:80%;}
}

.buttons{
width:100%;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
margin-top:auto
padding-top:10px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:gold;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
font-size:12px;
}

button:hover{
background:white;
}

.start-btn{
width:100%;
margin-top:5px;
background:#00ffcc;
}

.game-over{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
padding:20px;
border-radius:15px;
display:none;
text-align:center;

@media(max-width:600px){
.word{font-size:18px;}
button{font-size:10px;padding:8px;}
}

<div class="game-over" id="gameOver">
<h2> Fin ! </h2>
<p>Score: <span id="finalScore"></span></p>
<button onclick="restartGame()">Rejouer</button>

// ===================================================

let currentWord = null;
let currentType = null;
let score = 0;
let level = 1;
let gameActive = false;
let fallDuration = 8000;
let timer = null;

let bestScore = localStorage.getItem("bestScore") || 0;
document.getElementById("bestScore").innerText = bestScore;

function randomWord(){
const types = Object.keys(words);
const randomType = types[Math.floor(Math.random()*types.length)];
const wordList = words[randomType];
const word = wordList[Math.floor(Math.random()*wordList.length)];
return {word,type:randomType};
}

function createWord(){
if(!gameActive) return;

const data = randomWord();
currentWord = data.word;
currentType = data.type;

const wordElement = document.createElement("div");
wordElement.classList.add("word");
wordElement.innerText = currentWord;
wordElement.style.animationDuration = fallDuration+"ms";

document.getElementById("gameArea").innerHTML="";
document.getElementById("gameArea").appendChild(wordElement);

if(timer){ 
clearTimeout(timer); 
}
timer = setTimeout(()=>{
if(gameActive){
endGame();
}
}, fallDuration);}

function checkAnswer(type){
if(!gameActive) return;

if(type===currentType){
clearTimeout(timer);
score++;
level++;
fallDuration = Math.max(4500,fallDuration-40);
updateScore();
createWord();
}else{
endGame();
}
}

function updateScore(){
document.getElementById("score").innerText = score;
document.getElementById("level").innerText = level;
}

function startGame(){
if(gameActive) return;
gameActive = true;
score = 0;
level = 1;
fallDuration = 5000;
updateScore();
createWord();
}

function endGame(){
gameActive = false;
document.getElementById("finalScore").innerText = score;

if(score>bestScore){
bestScore = score;
localStorage.setItem("bestScore",score);
document.getElementById("bestScore").innerText = score;
}

document.getElementById("gameOver").style.display="block";
}

function restartGame(){
document.getElementById("gameOver").style.display="none";
startGame();
}
